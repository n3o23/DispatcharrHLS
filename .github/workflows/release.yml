name: Release

# Manually triggered from the Actions tab.
# Bumps version.py, commits + tags, builds the production Docker image,
# and creates a GitHub Release with auto-generated notes.
on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch   # 1.0.0 → 1.0.1  (bug fixes)
          - minor   # 1.0.0 → 1.1.0  (new features, backwards compatible)
          - major   # 1.0.0 → 2.0.0  (breaking changes)
      release_notes:
        description: 'Additional release notes (optional)'
        required: false
        type: string

permissions:
  contents: write   # push commits, create tags and releases
  packages: write   # push to GHCR

jobs:
  # ── 1. Bump version, commit, tag ────────────────────────────────────────────
  prepare:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
      repo_owner:  ${{ steps.meta.outputs.repo_owner }}
      repo_name:   ${{ steps.meta.outputs.repo_name }}
      timestamp:   ${{ steps.ts.outputs.timestamp }}

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name  "GitHub Actions"
          git config user.email "actions@github.com"

      - name: Bump version in version.py
        id: bump
        run: |
          CURRENT=$(python -c "import version; print(version.__version__)")
          echo "Current version: ${CURRENT}"

          IFS='.' read -r MAJOR MINOR PATCH <<< "${CURRENT}"
          case "${{ github.event.inputs.version_bump }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac
          NEW="${MAJOR}.${MINOR}.${PATCH}"
          echo "New version: ${NEW}"

          sed -i "s/__version__ = '.*'/__version__ = '${NEW}'/" version.py
          grep -q "__version__ = '${NEW}'" version.py || { echo "version.py update failed"; exit 1; }

          echo "new_version=${NEW}" >> $GITHUB_OUTPUT

      - name: Set image metadata
        id: meta
        run: |
          echo "repo_owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
          echo "repo_name=$(echo '${{ github.repository }}' | cut -d'/' -f2 | tr '[:upper:]' '[:lower:]')"   >> $GITHUB_OUTPUT

      - name: Generate build timestamp
        id: ts
        run: echo "timestamp=$(date -u +'%Y%m%d%H%M%S')" >> $GITHUB_OUTPUT

      - name: Commit and tag
        run: |
          git add version.py
          git commit -m "Release v${{ steps.bump.outputs.new_version }}"
          git tag -a "v${{ steps.bump.outputs.new_version }}" \
                 -m "Release v${{ steps.bump.outputs.new_version }}"
          git push origin main --tags

  # ── 2. Build and push production Docker image ───────────────────────────────
  docker:
    needs: prepare
    runs-on: ubuntu-latest

    steps:
      - name: Checkout tagged commit
        uses: actions/checkout@v4
        with:
          ref: v${{ needs.prepare.outputs.new_version }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push release image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ needs.prepare.outputs.repo_owner }}/${{ needs.prepare.outputs.repo_name }}:latest
            ghcr.io/${{ needs.prepare.outputs.repo_owner }}/${{ needs.prepare.outputs.repo_name }}:v${{ needs.prepare.outputs.new_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            REPO_OWNER=${{ needs.prepare.outputs.repo_owner }}
            REPO_NAME=${{ needs.prepare.outputs.repo_name }}
            BASE_TAG=base
            TIMESTAMP=${{ needs.prepare.outputs.timestamp }}

  # ── 3. Create GitHub Release ─────────────────────────────────────────────────
  release:
    needs: [prepare, docker]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout tagged commit
        uses: actions/checkout@v4
        with:
          ref: v${{ needs.prepare.outputs.new_version }}
          fetch-depth: 0

      - name: Build release body
        id: notes
        run: |
          VERSION="v${{ needs.prepare.outputs.new_version }}"
          IMAGE="ghcr.io/${{ needs.prepare.outputs.repo_owner }}/${{ needs.prepare.outputs.repo_name }}"

          BODY="## Docker image

          \`\`\`yaml
          image: ${IMAGE}:${VERSION}
          \`\`\`
          or always-latest:
          \`\`\`yaml
          image: ${IMAGE}:latest
          \`\`\`"

          if [[ -n "${{ github.event.inputs.release_notes }}" ]]; then
            BODY="${BODY}

          ## Notes

          ${{ github.event.inputs.release_notes }}"
          fi

          # Write to file to avoid quoting issues with multiline strings
          echo "${BODY}" > /tmp/release_body.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare.outputs.new_version }}
          name: v${{ needs.prepare.outputs.new_version }}
          body_path: /tmp/release_body.md
          generate_release_notes: true   # auto-appends PR/commit list since last tag
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
