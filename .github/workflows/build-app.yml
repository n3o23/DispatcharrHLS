name: Build App Image

# Builds the all-in-one (AIO) application image and pushes it to GHCR.
#
#   main branch  →  ghcr.io/<owner>/<repo>:latest
#
# The base image (DispatcharrBase) must be built separately by running
# docker buildx build -f docker/DispatcharrBase ... locally or via workflow_dispatch.
on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docker/DispatcharrBase'
      - 'pyproject.toml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-app:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify build context
        run: |
          test -d frontend || (echo "ERROR: frontend/ directory missing" && exit 1)
          test -f frontend/package.json || (echo "ERROR: frontend/package.json missing" && exit 1)

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image name and tags
        id: meta
        run: |
          REPO="$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          IMAGE="ghcr.io/${REPO}"
          OWNER="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          REPO_NAME="$(echo '${{ github.repository }}' | cut -d'/' -f2 | tr '[:upper:]' '[:lower:]')"
          SHA_SHORT="${{ github.sha }}"
          SHA_SHORT="${SHA_SHORT:0:7}"

          echo "image=${IMAGE}"         >> $GITHUB_OUTPUT
          echo "repo_owner=${OWNER}"    >> $GITHUB_OUTPUT
          echo "repo_name=${REPO_NAME}" >> $GITHUB_OUTPUT
          echo "sha_short=${SHA_SHORT}" >> $GITHUB_OUTPUT

      - name: Generate build timestamp
        id: ts
        run: echo "timestamp=$(date -u +'%Y%m%d%H%M%S')" >> $GITHUB_OUTPUT

      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ steps.meta.outputs.image }}:latest
            ${{ steps.meta.outputs.image }}:${{ steps.ts.outputs.timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            REPO_OWNER=${{ steps.meta.outputs.repo_owner }}
            REPO_NAME=${{ steps.meta.outputs.repo_name }}
            BASE_TAG=base
            TIMESTAMP=${{ steps.ts.outputs.timestamp }}
